<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APIs | AI API Hub 2026</title>
  <meta name="description" content="Catálogo de APIs de IA: NLP, visión, OCR, audio, recomendación y sentimiento." />
  <style>
    :root{
      --bg:#070b16;--card:#11182f;--text:#eef3ff;--muted:#a7b3d6;--primary:#7c5cff;--primary2:#00d4ff;--border:rgba(255,255,255,.08);--shadow:0 18px 60px rgba(0,0,0,.35);--radius:20px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#060913 0%,#070b16 100%);color:var(--text)}
    a{text-decoration:none;color:inherit}
    .container{max-width:1200px;margin:0 auto;padding:0 20px}
    .header{position:sticky;top:0;z-index:100;backdrop-filter:blur(18px);background:rgba(7,11,22,.72);border-bottom:1px solid rgba(255,255,255,.06)}
    .nav{display:flex;align-items:center;justify-content:space-between;min-height:76px;gap:18px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900}
    .logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 10px 28px rgba(124,92,255,.28)}
    .navlinks{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
    .navlinks a{color:var(--muted);font-weight:600}.navlinks a:hover{color:#fff}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;transition:.25s ease}
    .btn:hover{transform:translateY(-2px)}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:var(--shadow)}
    .btn-outline{background:transparent;color:#fff;border:1px solid var(--border)}
    .btn-outline:hover{background:rgba(255,255,255,.03)}
    .section{padding:48px 0 78px}
    .section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
    .section-head h1,.section-head h2{margin:0}
    .section-head p{margin:0;color:var(--muted);max-width:720px;line-height:1.7}
    .toolbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:18px}
    .search{
      flex:1;min-width:260px;display:flex;align-items:center;gap:10px;
      padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--border)
    }
    .search input{width:100%;background:transparent;border:none;outline:none;color:#fff;font-size:1rem}
    .filters{display:flex;gap:10px;flex-wrap:wrap}
    .chip{
      padding:11px 14px;border-radius:999px;border:1px solid var(--border);
      background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer
    }
    .chip.active,.chip:hover{color:#fff;border-color:rgba(124,92,255,.45);background:rgba(124,92,255,.16)}
    .grid{display:grid;gap:18px}
    .cards{grid-template-columns:repeat(3,1fr);margin-top:20px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)
    }
    .api-card{padding:22px;display:flex;flex-direction:column;gap:12px}
    .api-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .api-icon{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:1.2rem;background:linear-gradient(135deg,rgba(124,92,255,.22),rgba(0,212,255,.18));border:1px solid rgba(255,255,255,.08)}
    .api-title{margin:0;font-size:1.12rem}
    .api-desc{color:var(--muted);font-size:.96rem;line-height:1.65;min-height:72px}
    .tag{font-size:.78rem;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#d7def6}
    .api-meta{display:flex;gap:8px;flex-wrap:wrap}
    .price{font-size:1.1rem;font-weight:900;color:#fff;margin-top:6px}
    .api-actions{display:flex;gap:10px;margin-top:auto}
    .api-actions .btn{width:100%;padding:12px 14px;border-radius:12px}
    .footer{padding:30px 0;border-top:1px solid rgba(255,255,255,.06);color:var(--muted)}
    .footer a{color:var(--muted)} .footer a:hover{color:#fff}
    .mobile-toggle{display:none;background:transparent;border:1px solid var(--border);color:#fff;border-radius:12px;padding:10px 12px}
    @media (max-width: 980px){.cards{grid-template-columns:1fr}.navlinks{display:none}.mobile-toggle{display:inline-flex}}
  </style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="nav">
      <a class="brand" href="index.html"><div class="logo">AI</div><div><div>AI API Hub</div><small style="color:var(--muted)">Marketplace de APIs</small></div></a>
      <nav class="navlinks" id="navlinks">
        <a href="index.html">Inicio</a><a href="apis.html">APIs</a><a href="pricing.html">Precios</a><a href="dashboard.html">Dashboard</a><a href="contact.html">Contacto</a>
      </nav>
      <button class="mobile-toggle" onclick="toggleMenu()">☰</button>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="section-head">
      <div>
        <h1>Catálogo de APIs</h1>
        <p>Busca, filtra y compara APIs de inteligencia artificial por categoría y proveedor.</p>
      </div>
    </div>

    <div class="toolbar">
      <div class="search">🔎 <input id="searchInput" type="text" placeholder="Buscar API, proveedor o categoría..." /></div>
      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">Todas</button>
        <button class="chip" data-filter="NLP">NLP</button>
        <button class="chip" data-filter="Visión">Visión</button>
        <button class="chip" data-filter="OCR">OCR</button>
        <button class="chip" data-filter="Audio">Audio</button>
        <button class="chip" data-filter="Recomendación">Recomendación</button>
        <button class="chip" data-filter="Sentimiento">Sentimiento</button>
      </div>
    </div>

    <div class="grid cards" id="apiCards"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    © 2026 AI API Hub. Todos los derechos reservados.
  </div>
</footer>

<script>
  function toggleMenu(){ document.getElementById('navlinks').style.display = document.getElementById('navlinks').style.display === 'flex' ? 'none' : 'flex'; }
  const apis = [
    { name:"Text Generation API", category:"NLP", icon:"✍️", provider:"OpenAI Compatible", price:"Desde $19/mes", tags:["Texto","Chat","Prompts"], description:"Genera contenido original para asistentes, marketing y automatización." },
    { name:"Sentiment Analysis API", category:"Sentimiento", icon:"😊", provider:"NLP Cloud", price:"Desde $15/mes", tags:["Opiniones","NLP","Clasificación"], description:"Detecta emociones y polaridad en textos para reviews y soporte." },
    { name:"OCR Extraction API", category:"OCR", icon:"📄", provider:"Vision Docs", price:"Desde $29/mes", tags:["PDF","Imagen","Documentos"], description:"Extrae texto de imágenes y PDFs escaneados con detección de tablas." },
    { name:"Object Detection API", category:"Visión", icon:"👁️", provider:"Vision AI", price:"Desde $39/mes", tags:["Bounding Boxes","Seguridad","Video"], description:"Detecta objetos en imágenes y video con coordenadas y confianza." },
    { name:"Speech-to-Text API", category:"Audio", icon:"🎙️", provider:"VoiceLab", price:"Desde $25/mes", tags:["Audio","Transcripción","Tiempo real"], description:"Convierte voz a texto para reuniones, llamadas y podcasts." },
    { name:"Recommendation API", category:"Recomendación", icon:"🎯", provider:"Reco Engine", price:"Desde $49/mes", tags:["Personalización","Ecommerce","SaaS"], description:"Genera recomendaciones basadas en historial y contexto del usuario." }
  ];

  const apiCards = document.getElementById("apiCards");
  const searchInput = document.getElementById("searchInput");
  const filters = document.getElementById("filters");
  let activeFilter = "all";

  function renderApis(){
    const q = searchInput.value.toLowerCase().trim();
    const filtered = apis.filter(api => {
      const f = activeFilter === "all" || api.category === activeFilter;
      const m = api.name.toLowerCase().includes(q) || api.category.toLowerCase().includes(q) || api.provider.toLowerCase().includes(q) || api.description.toLowerCase().includes(q);
      return f && m;
    });

    apiCards.innerHTML = filtered.map(api => `
      <div class="card api-card">
        <div class="api-top">
          <div style="display:flex;gap:14px">
            <div class="api-icon">${api.icon}</div>
            <div>
              <h3 class="api-title">${api.name}</h3>
              <div style="color:var(--muted);font-size:.9rem;margin-top:4px">${api.provider}</div>
            </div>
          </div>
          <span style="display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(124,92,255,.14);border:1px solid rgba(124,92,255,.22);font-size:.78rem">${api.category}</span>
        </div>
        <p class="api-desc">${api.description}</p>
        <div class="api-meta">${api.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
        <div class="price">${api.price}</div>
        <div class="api-actions">
          <a class="btn btn-outline" href="api-detail.html">Ver detalle</a>
          <button class="btn btn-primary" onclick="alert('Demo: aquí conectarías la compra real.')">Comprar</button>
        </div>
      </div>
    `).join("");

    if(!filtered.length){
      apiCards.innerHTML = `<div class="card" style="padding:24px;grid-column:1/-1">No se encontraron resultados.</div>`;
    }
  }

  searchInput.addEventListener("input", renderApis);
  filters.addEventListener("click", (e) => {
    if(e.target.classList.contains("chip")){
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      e.target.classList.add("active");
      activeFilter = e.target.dataset.filter;
      renderApis();
    }
  });
  renderApis();
</script>
</body>
</html>
